<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="description" content="Helps with MSE-based video concatenation">
    <title>seamless.js</title>
    <link rel="icon" href="//example.thewhodidthis.com/favicon.ico">
    <link rel="dns-prefetch" href="//unpkg.com">
    <link rel="preload" href="index.css" as="style">
    <link rel="stylesheet" href="index.css">
    <script src="bundle.js" defer></script>
  </head>
  <body>
    <figure>
      <video controls playinline is="very-seamless" poster="assets/poster.png" height="360" width="480">
        <very-seamless-clip src="assets/fragment-5.mp4" alt="assets/segment-5.ts"></very-seamless-clip>
        <very-seamless-clip src="assets/fragment-4.mp4" alt="assets/segment-4.ts"></very-seamless-clip>
        <very-seamless-clip src="assets/fragment-3.mp4" alt="assets/segment-3.ts"></very-seamless-clip>
        <very-seamless-clip src="assets/fragment-2.mp4" alt="assets/segment-2.ts"></very-seamless-clip>
        <very-seamless-clip src="assets/fragment-1.mp4" alt="assets/segment-1.ts"></very-seamless-clip>
        <very-seamless-clip src="assets/fragment-0.mp4" alt="assets/segment-0.ts"></very-seamless-clip>
      </video>
      <figcaption>
        <p><strong><a href="https://github.com/thewhodidthis/seamless">seamless.js</a></strong> Helps sequence clips on demand via MSE</p>
      </figcaption>
    </figure>
    <script>
      try {
        customElements.define('is-ok', document.createElement('p').constructor, { extends: 'p' });
      } catch (_) {
        document.write('<script src="//unpkg.com/@ungap/custom-elements-builtin"><\x2fscript>');
      }
    </script>
  </body>
</html>
